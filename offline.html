<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Offline - Grocery Tracking</title>
<style>
body{
margin:0;
font-family:Arial,sans-serif;
background:#F5F7FB;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
text-align:center;
}
.card{
background:#fff;
padding:30px;
border-radius:20px;
box-shadow:0 10px 30px rgba(0,0,0,.1);
max-width:350px;
}
h1{
color:#7C3AED;
margin-bottom:10px;
}
p{
color:#666;
}
button{
margin-top:20px;
padding:12px 25px;
border:none;
border-radius:12px;
background:#7C3AED;
color:#fff;
font-size:16px;
cursor:pointer;
}
</style>
</head>
<body>

<div class="card">
<h1>📶 You're Offline</h1>
<p>Please check your internet connection and try again.</p>
<button onclick="location.reload()">Retry</button>
</div>

</body>
</html>
